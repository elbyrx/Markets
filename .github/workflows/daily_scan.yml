name: Daily Ichimoku Scan (07:00 Warsaw)

on:
  schedule:
    # cron jest w UTC; dwa wpisy + guard poniżej (Warsaw 07:00 CET/CEST)
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Warsaw time == 07
        id: war_time
        run: |
          HOUR=$(TZ=Europe/Warsaw date +%H)
          echo "Warsaw hour is: $HOUR"
          if [ "$HOUR" != "07" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run screener
        if: steps.war_time.outputs.skip != 'true'
        run: |
          python -u ichimoku_runner.py

      - name: Load subject
        if: steps.war_time.outputs.skip != 'true'
        id: subj
        run: |
          SUBJECT="$(cat email_subject.txt)"
          echo "subject=$SUBJECT" >> $GITHUB_OUTPUT

      - name: Load HTML body
        if: steps.war_time.outputs.skip != 'true'
        id: body
        run: |
          {
            echo "html<<EOF"
            cat email_body.html
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Send email (HTML, no attachments)
        if: steps.war_time.outputs.skip != 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ steps.subj.outputs.subject }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.SMTP_USERNAME }}
          html_body: ${{ steps.body.outputs.html }}
