name: TEST Ichimoku Scan

on:
  workflow_dispatch: {}   # tylko ręczne uruchomienie

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screener script
        run: |
          echo "=== START SCRIPT ==="
          python ichimoku_runner.py
          echo "=== SCRIPT FINISHED ==="

      - name: Debug - list files
        run: |
          echo "=== FILES IN WORKSPACE ==="
          ls -la

      - name: Debug - show signals.csv
        run: |
          echo "=== CONTENT OF signals.csv ==="
          cat signals.csv || echo "signals.csv not found"

      - name: Debug - show failed.csv
        run: |
          echo "=== CONTENT OF failed.csv ==="
          cat failed.csv || echo "failed.csv not found"

      - name: Upload CSV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ichimoku-test-output
          path: |
            signals.csv
            failed.csv

      - name: Send test email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "TEST Ichimoku screener"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            To jest TEST workflow GitHub Actions.
            W załączniku znajdują się pliki signals.csv i failed.csv.
          attachments: |
            signals.csv
            failed.csv
